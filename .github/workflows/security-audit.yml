name: Security Audit & Lint

on:
  push:
    paths:
      - 'mobile/rust-core/Cargo.toml'
      - 'mobile/rust-core/Cargo.lock'
      - 'mobile/rust-core/src/**'
  pull_request:
    paths:
      - 'mobile/rust-core/Cargo.toml'
      - 'mobile/rust-core/Cargo.lock'
      - 'mobile/rust-core/src/**'
  schedule:
    # Run automatically once a week (e.g., every Monday at 00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  audit:
    name: Security Audit & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo Registry & Audit DB
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/advisory-db
            mobile/rust-core/target
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('mobile/rust-core/Cargo.lock') }}

      - name: Install cargo-audit (Specific Version)
        run: cargo install cargo-audit --version 0.20.0

      - name: Run Cargo Audit (Security Check)
        working-directory: mobile/rust-core
        run: |
          cargo audit --json > audit-results.json || true
          # Fail if vulnerabilities found (check exit code of a separate run or parse JSON)
          cargo audit 
        # The second command ensures the job fails if vulnerabilities are found.
        # The first command saves results for artifact upload even if it fails.

      - name: Upload Audit Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-results
          path: mobile/rust-core/audit-results.json

      - name: Check Code Formatting
        working-directory: mobile/rust-core
        run: cargo fmt -- --check

      - name: Run Clippy (Linter)
        working-directory: mobile/rust-core
        # Treat warnings as errors to ensure high code quality
        run: cargo clippy -- -D warnings

      - name: Install cargo-udeps (Check for unused dependencies)
        run: cargo install cargo-udeps
      
      - name: Run Unused Dependencies Check
        working-directory: mobile/rust-core
        run: cargo udeps --all-targets
        # This helps minimize attack surface by removing unused crates

      - name: Run Tests
        working-directory: mobile/rust-core
        run: cargo test
