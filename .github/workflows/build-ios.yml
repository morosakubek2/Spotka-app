name: Build iOS Alpha

on:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios, x86_64-apple-ios

      - name: Install cargo-lipo
        run: cargo install cargo-lipo

      - name: Build Rust Core for iOS
        run: |
          cd mobile/rust-core
          cargo build --release --target aarch64-apple-ios
          mkdir -p ../ios/Frameworks
          cp target/aarch64-apple-ios/release/libspotka_core.a ../ios/Frameworks/

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer

      - name: Build IPA
        run: |
          cd mobile/ios
          xcodebuild -workspace Spotka.xcworkspace \
            -scheme Spotka \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/Spotka.xcarchive \
            archive \
            EXPORT_METHOD=development \
            -exportArchive \
            -exportPath $PWD/build/IPA

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotka-ios-alpha
          path: mobile/ios/build/IPA/Spotka.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: mobile/ios/build/IPA/Spotka.ipa
          body: |
            ## Spotka iOS Alpha
            - Wersja testowa dla urządzeń fizycznych
            - Wymaga podpisu developerskiego do instalacji
