name: Build iOS Alpha

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-ios:
    runs-on: macos-latest
    # Wybór konkretnej wersji Xcode (ważne dla stabilności buildu)
    env:
      DEVELOPER_DIR: /Applications/Xcode_15.0.app/Contents/Developer
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Cache for Rust/Cargo ---
      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

      - name: Install cargo-lipo (optional, if needed for universal libs)
        run: cargo install cargo-lipo || true

      # --- Build Rust Core ---
      - name: Build Rust Core for iOS
        run: |
          cd mobile/rust-core
          # Build for Device (ARM64)
          cargo build --release --target aarch64-apple-ios
          # Build for Simulator (ARM64 & x86_64) - optional if you want universal simulator lib
          cargo build --release --target aarch64-apple-ios-sim
          
          # Create Framework structure manually or via script
          mkdir -p ../ios/Frameworks/libspotka_core.xcframework
          
          # Use xcodebuild to create .xcframework from static libs
          # This is a simplified example; in production you might need to merge sim libs
          xcodebuild -create-xcframework \
            -library target/aarch64-apple-ios/release/libspotka_core.a \
            -headers src/ffi/ios.h \
            -library target/aarch64-apple-ios-sim/release/libspotka_core.a \
            -headers src/ffi/ios.h \
            -output ../ios/Frameworks/libspotka_core.xcframework

      # --- Build iOS App ---
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer

      - name: Build IPA
        run: |
          cd mobile/ios
          
          # Define scheme and workspace
          SCHEME="Spotka"
          WORKSPACE="Spotka.xcworkspace"
          
          # Archive the app
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/"$SCHEME".xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

          # Export IPA (Requires Signing Identity & Profile)
          # For CI, you usually need to import certificates first or use 'developer' export method for ad-hoc/testing
          # Here we assume 'Development' export for testing on physical devices without App Store distribution
          
          # Create ExportOptions.plist dynamically if not committed
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/"$SCHEME".xcarchive \
            -exportPath build/IPA \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      # --- Upload Artifact ---
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotka-ios-alpha
          path: mobile/ios/build/IPA/Spotka.ipa
          if-no-files-found: error

      # --- Create GitHub Release ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: mobile/ios/build/IPA/Spotka.ipa
          body: |
            ## Spotka iOS Alpha Release
            
            ### Installation Instructions
            1. Download the `.ipa` file.
            2. Install via Xcode, Apple Configurator, or a sideloading service (e.g., AltStore, TestFlight).
            3. Requires a valid Development Certificate.
            
            ### Changes
            - 100% Rust Core
            - P2P Networking & App-Chain
            - Reductive Functionalism UI
          fail_on_unmatched_files: true
