[package]
name = "spotka-core"
version = "0.1.0-alpha"
edition = "2021"
license = "AGPL-3.0"

[lib]
crate-type = ["staticlib", "cdylib"]
name = "spotka_core"

[dependencies]
# Kryptografia
ed25519-dalek = "2.0"
x25519-dalek = "2.0"
aes-gcm = "0.10"
argon2 = "0.5"
blake3 = "1.5"
rand = "0.8"

# Sieć i Async
tokio = { version = "1.35", features = ["full"] }
libp2p = { version = "0.53", features = ["tcp", "noise", "yamux", "mdns", "gossipsub"] }
quinn = "0.10"

# Baza danych
rusqlite = { version = "0.30", features = ["bundled"] }

# Serializacja
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Narzędzia
thiserror = "1.0"
log = "0.4"
chrono = "0.4"

# UI (Slint)
slint = "1.5"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true

[profile.dev]
opt-level = 0
